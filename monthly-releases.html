<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Releases & Experiments</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #EEF2F3;
            --surface: #ffffff;
            --accent: #2563eb;
            --text-main: #1A1A2E;
            --text-muted: #6B7280;
            --border: #E2E8F0;
            
            --radius-card: 20px;
            --radius-pill: 14px;
            
            --shadow-base: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 32px rgba(0,0,0,0.10);
            
            --transition: 0.2s ease;
            
            --color-advertising: #dc2626;
            --color-brand: #10b981;
            --color-infra: #6366f1;
            
            --pill-p0: #fee2e2; --text-p0: #991b1b;
            --pill-p1: #ffedd5; --text-p1: #9a3412;
            --pill-p2: #dbeafe; --text-p2: #1e40af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout Structure */
        .dashboard-layout {
            display: flex;
            max-width: 1440px;
            margin: 0 auto;
            align-items: flex-start;
            min-height: 100vh;
        }
        .sidebar {
            width: var(--sidebar-width, 260px);
            flex-shrink: 0;
            padding: 24px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
            border-right: 1px solid var(--border);
            background-color: var(--bg-color);
            transition: width 0.3s ease, padding 0.3s ease;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 200;
        }
        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width, 64px);
            padding: 24px 8px;
        }
        .sidebar-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            margin-bottom: 24px;
            align-self: flex-end;
            transition: transform 0.3s ease, background-color 0.2s ease;
            flex-shrink: 0;
        }
        .sidebar-toggle:hover {
            background-color: var(--surface);
            color: var(--text-main);
        }
        .sidebar.collapsed .sidebar-toggle {
            transform: rotate(180deg);
            align-self: center;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }
        .nav-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 10px 12px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            white-space: nowrap;
            font-family: inherit;
        }
        .nav-btn svg { flex-shrink: 0; }
        .nav-btn:hover { color: var(--text-main); background: var(--surface); box-shadow: var(--shadow-base); }
        .nav-btn.active { background-color: var(--accent); color: #fff; }
        .sidebar.collapsed .btn-label { opacity: 0; width: 0; overflow: hidden; }
        .sidebar.collapsed .month-links { display: none; }
        .sidebar.collapsed .stats { display: none; }
        .sidebar.collapsed .divider { display: none; }
        .sidebar.collapsed .export-actions { display: none; }

        .main-content {
            flex-grow: 1;
            padding: 0;
            min-width: 0;
            background-color: var(--bg-color);
        }
        
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(238, 242, 243, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-brand {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .month-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .month-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all var(--transition);
        }
        .month-link:hover, .month-link.active {
            background-color: rgba(0,0,0,0.04);
            color: var(--text-main);
        }
        
        .divider {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 24px 0;
        }

        .stats {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .export-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-family: inherit;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .btn svg { flex-shrink: 0; }
        .btn:hover {
            border-color: #cbd5e1;
            box-shadow: var(--shadow-base);
            transform: translateY(-1px);
        }
        
        .content-area {
            max-width: 720px;
            margin: 2rem auto;
            display: flex;
            flex-direction: column;
            gap: 3rem;
            padding: 0 2rem;
        }

        /* Monthly Section */
        .month-section {
            scroll-margin-top: 80px;
        }
        .month-header {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .month-divider {
            border: 0;
            border-top: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }
        .sub-section-header {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 2rem 0 1rem;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-base);
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
            transition: all var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }
        
        /* Area Indicator */
        .card-indicator {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }
        .area-advertising { background-color: var(--color-advertising); }
        .area-brand_integrations { background-color: var(--color-brand); }
        .area-infrastructure { background-color: var(--color-infra); }

        .card-header {
            padding: 1.25rem 1.5rem;
            padding-left: 2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }
        
        .card-header-main { flex-grow: 1; }
        
        .card-title-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        
        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .card-meta-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        /* Badges & Pills */
        .pill {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            font-size: 0.75rem;
            font-weight: 500;
        }
        .pill-p0 { background: var(--pill-p0); color: var(--text-p0); }
        .pill-p1 { background: var(--pill-p1); color: var(--text-p1); }
        .pill-p2 { background: var(--pill-p2); color: var(--text-p2); }
        
        .pill-area { background: #f3f4f6; color: #4b5563; }
        .pill-status-shipped { background: #dcfce7; color: #166534; }
        .pill-status-rolling { background: #fef9c3; color: #854d0e; }
        .pill-status-planned { background: #dbeafe; color: #1e40af; }
        .pill-team { background: #f1f5f9; border: 1px solid #e2e8f0; color: #475569; }

        .verdict-confirmed { background: #d1fae5; color: #065f46; }
        .verdict-not_confirmed { background: #fee2e2; color: #991b1b; }
        .verdict-inconclusive { background: #fef3c7; color: #92400e; }

        .chevron {
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: transform var(--transition);
        }
        .card.expanded .chevron { transform: rotate(90deg); }

        /* Card Details (Expanded) */
        .card-details {
            display: none;
            padding: 0 1.5rem 1.5rem 2rem;
            border-top: 1px solid var(--border);
            margin-top: -0.5rem;
            padding-top: 1rem;
            font-size: 0.95rem;
        }
        .card.expanded .card-details { display: block; }
        
        .details-section { margin-bottom: 1rem; }
        .details-section:last-child { margin-bottom: 0; }
        
        .impact-text { font-weight: 600; color: var(--text-main); }
        .hypothesis-text { font-style: italic; color: var(--text-muted); }
        
        .metric-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            margin: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .metric-name { font-weight: 500; font-size: 0.9rem; color: var(--text-muted); }
        .metric-result { font-weight: 600; font-size: 1.1rem; margin-top: 2px; }
        .metric-target { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .metrics-list {
            list-style: none;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .metrics-list li {
            padding: 4px 0;
            border-bottom: 1px dashed var(--border);
            display: flex;
            justify-content: space-between;
        }
        .metrics-list li:last-child { border-bottom: none; }

        .links-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .link-pill {
            text-decoration: none;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: var(--radius-pill);
            font-size: 0.8rem;
            color: var(--text-main);
            transition: all var(--transition);
        }
        .link-pill:hover { background: #f1f5f9; }

        .notes-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: #f9fafb;
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 1rem;
            border-left: 2px solid var(--border);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard-layout { flex-direction: column; }
            .sidebar { width: 100% !important; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; flex-direction: row; align-items: center; justify-content: space-between; }
            .sidebar-toggle { display: none; }
            .sidebar-nav { flex-direction: row; flex-wrap: wrap; width: 100%; gap: 8px; margin-bottom: 0; }
            .nav-btn { width: auto; padding: 8px 16px; }
            .sidebar.collapsed .btn-label { opacity: 1; width: auto; overflow: visible; }
            .main-content { padding: 0; width: 100%; }
            .month-links {
                flex-direction: row;
                overflow-x: auto;
                padding-bottom: 8px;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
            }
            .export-actions {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .divider, .stats { display: none; }
        }
    </style>
</head>

            let data = JSON.parse(localStorage.getItem('monthly_releases_data'));
            const storedVersion = parseInt(localStorage.getItem('monthly_releases_seed_version') || '0');
            
            if (!data || storedVersion < SEED_VERSION) {
                data = [...SEED_DATA];
                localStorage.setItem('monthly_releases_seed_version', SEED_VERSION.toString());
            }
            
            // Merge pending
            if (PENDING_RELEASES.length > 0) {
                const existingIds = new Set(data.map(d => d.id));
                for (const item of PENDING_RELEASES) {
                    if (!existingIds.has(item.id)) {
                        data.push(item);
                    }
                }
            }
            
            appData = data;
            localStorage.setItem('monthly_releases_data', JSON.stringify(appData));
            
            renderPage();
        }

        function formatMonthString(yyyyMm) {
            const [year, month] = yyyyMm.split('-');
            const date = new Date(year, parseInt(month) - 1);
            return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        }

        function toggleCard(element) {
            const card = element.closest('.card');
            card.classList.toggle('expanded');
        }

        function createPill(text, typeClass) {
            return `<span class="pill ${typeClass}">${text}</span>`;
        }

        function createTeamPills(teamArray) {
            if (!teamArray || !teamArray.length) return '';
            return teamArray.map(t => createPill(TEAM_NAMES[t] || t, 'pill-team')).join('');
        }

        function renderLinks(links) {
            if (!links) return '';
            const html = [];
            for (const [key, val] of Object.entries(links)) {
                if (val) {
                    const label = key.charAt(0).toUpperCase() + key.slice(1);
                    html.push(`<a href="${val}" class="link-pill" target="_blank">${label}</a>`);
                }
            }
            if (html.length === 0) return '';
            return `<div class="links-row">${html.join('')}</div>`;
        }

        function renderReleaseCard(item) {
            const statusLabels = { 'shipped': 'Shipped', 'rolling_out': 'Rolling Out', 'planned': 'Planned' };
            const statusClass = item.status === 'shipped' ? 'pill-status-shipped' : (item.status === 'rolling_out' ? 'pill-status-rolling' : 'pill-status-planned');
            
            return `
            <div class="card">
                <div class="card-indicator area-${item.area}"></div>
                <div class="card-header" onclick="toggleCard(this)">
                    <div class="card-header-main">
                        <div class="card-title-row">
                            <span class="card-title">${item.name}</span>
                            ${createPill(item.priority, `pill-${item.priority.toLowerCase()}`)}
                            ${createPill(AREA_LABELS[item.area], 'pill-area')}
                        </div>
                        <div class="card-meta-row">
                            <span>${item.releaseDate}</span>
                            <span>•</span>
                            ${createPill(statusLabels[item.status] || item.status, statusClass)}
                            <span>•</span>
                            ${createTeamPills(item.team)}
                        </div>
                    </div>
                    <div class="chevron">▸</div>
                </div>
                <div class="card-details">
                    <div class="details-section">
                        <p>${item.summary}</p>
                    </div>
                    ${item.impact ? `<div class="details-section impact-text">Impact: ${item.impact}</div>` : ''}
                    ${renderLinks(item.links)}
                    ${item.notes ? `<div class="notes-text">${item.notes}</div>` : ''}
                </div>
            </div>`;
        }

        function renderExperimentCard(item) {
            const verdictLabels = { 'confirmed': 'Confirmed', 'not_confirmed': 'Not Confirmed', 'inconclusive': 'Inconclusive' };
            const verdictClass = `verdict-${item.verdict}`;
            
            let secondaryMetricsHtml = '';
            if (item.secondaryMetrics && item.secondaryMetrics.length > 0) {
                secondaryMetricsHtml = `
                    <ul class="metrics-list">
                        ${item.secondaryMetrics.map(m => `
                            <li>
                                <span>${m.name}</span>
                                <strong>${m.result}</strong>
                            </li>
                        `).join('')}
                    </ul>
                `;
            }

            return `
            <div class="card">
                <div class="card-indicator area-${item.area}"></div>
                <div class="card-header" onclick="toggleCard(this)">
                    <div class="card-header-main">
                        <div class="card-title-row">
                            <span class="card-title">${item.name}</span>
                            ${createPill(item.priority, `pill-${item.priority.toLowerCase()}`)}
                            ${createPill(AREA_LABELS[item.area], 'pill-area')}
                            ${createPill(verdictLabels[item.verdict], verdictClass)}
                        </div>
                        <div class="card-meta-row">
                            <span>${item.startDate} → ${item.endDate}</span>
                            <span>•</span>
                            ${createTeamPills(item.team)}
                        </div>
                    </div>
                    <div class="chevron">▸</div>
                </div>
                <div class="card-details">
                    <div class="details-section hypothesis-text">
                        Hypothesis: "${item.hypothesis}"
                    </div>
                    
                    <div class="metric-card">
                        <div>
                            <div class="metric-name">${item.primaryMetric.name}</div>
                            <div class="metric-target">Target: ${item.primaryMetric.target}</div>
                        </div>
                        <div class="metric-result">${item.primaryMetric.result}</div>
                    </div>
                    
                    ${secondaryMetricsHtml}
                    
                    <div class="details-section">
                        <span class="impact-text">Verdict:</span> ${item.verdictSummary}
                    </div>
                    <div class="details-section" style="font-size: 0.8rem; color: var(--text-muted)">
                        Sample Size: ${item.sampleSize} | Confidence: ${item.confidence}
                    </div>
                    
                    ${renderLinks(item.links)}
                    ${item.notes ? `<div class="notes-text">${item.notes}</div>` : ''}
                </div>
            </div>`;
        }

        function renderPage() {
            // Group by month
            const grouped = {};
            let totalReleases = 0;
            let totalExperiments = 0;
            let confirmedExps = 0;

            appData.forEach(item => {
                if (!grouped[item.month]) grouped[item.month] = { releases: [], experiments: [] };
                
                if (item.type === 'release') {
                    grouped[item.month].releases.push(item);
                    totalReleases++;
                } else if (item.type === 'experiment') {
                    grouped[item.month].experiments.push(item);
                    totalExperiments++;
                    if (item.verdict === 'confirmed') confirmedExps++;
                }
            });

            // Sort months descending
            const sortedMonths = Object.keys(grouped).sort().reverse();
            
            // Render Sidebar Links
            const sidebarLinksEl = document.getElementById('sidebar-links');
            sidebarLinksEl.innerHTML = sortedMonths.map(m => 
                `<a href="#month-${m}" class="month-link">${formatMonthString(m)}</a>`
            ).join('');
            
            // Render Stats
            document.getElementById('sidebar-stats').innerHTML = 
                `${totalReleases} shipped · ${totalExperiments} experiments · ${confirmedExps} confirmed`;

            // Render Main Content
            const mainEl = document.getElementById('main-content');
            mainEl.innerHTML = '';
            
            sortedMonths.forEach(m => {
                const group = grouped[m];
                
                // Sort by date inside
                group.releases.sort((a,b) => b.releaseDate.localeCompare(a.releaseDate));
                group.experiments.sort((a,b) => b.endDate.localeCompare(a.endDate));
                
                let html = `
                    <section class="month-section" id="month-${m}">
                        <h2 class="month-header">${formatMonthString(m)}</h2>
                        <hr class="month-divider">
                `;
                
                if (group.releases.length > 0) {
                    html += `<div class="sub-section-header"><svg width="14" height="14" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg> RELEASES (${group.releases.length})</div>`;
                    html += group.releases.map(renderReleaseCard).join('');
                }
                
                if (group.experiments.length > 0) {
                    html += `<div class="sub-section-header"><svg width="14" height="14" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="M9 3h6v5.172a2 2 0 0 1-.586 1.414l-2 2"/><path d="M14.5 12.5L18 19a2 2 0 0 1-1.72 3H7.72A2 2 0 0 1 6 19l3.5-6.5"/><line x1="9" y1="3" x2="15" y2="3"/></svg> EXPERIMENTS (${group.experiments.length})</div>`;
                    html += group.experiments.map(renderExperimentCard).join('');
                }
                
                html += `</section>`;
                mainEl.innerHTML += html;
            });
            
            // Setup intersection observer for active link highlighting
            setupScrollSpy();
        }

        function setupScrollSpy() {
            const sections = document.querySelectorAll('.month-section');
            const navLinks = document.querySelectorAll('.month-link');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute('id');
                        navLinks.forEach(link => {
                            link.classList.remove('active');
                            if (link.getAttribute('href') === `#${id}`) {
                                link.classList.add('active');
                            }
                        });
                    }
                });
            }, { rootMargin: '-100px 0px -50% 0px' });
            
            sections.forEach(sec => { observer.observe(sec); });
        }

        // Export Functions
        function copySlackSummary() {
            // Group by month
            const grouped = {};
            appData.forEach(item => {
                if (!grouped[item.month]) grouped[item.month] = { releases: [], experiments: [] };
                if (item.type === 'release') grouped[item.month].releases.push(item);
                else if (item.type === 'experiment') grouped[item.month].experiments.push(item);
            });
            
            const sortedMonths = Object.keys(grouped).sort().reverse();
            let summaryText = '';
            
            sortedMonths.forEach(m => {
                const group = grouped[m];
                summaryText += `*${formatMonthString(m)}* — ${group.releases.length} releases, ${group.experiments.length} experiment(s)\n\n`;
                
                if (group.releases.length > 0) {
                    summaryText += `Releases:\n`;
                    group.releases.forEach(r => {
                        const dateStr = new Date(r.releaseDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        summaryText += `• ${r.name} (${r.priority}, ${AREA_LABELS[r.area]}) — Shipped ${dateStr}\n`;
                    });
                    summaryText += `\n`;
                }
                
                if (group.experiments.length > 0) {
                    summaryText += `Experiments:\n`;
                    group.experiments.forEach(e => {
                        const verdictIcon = e.verdict === 'confirmed' ? '✅' : (e.verdict === 'not_confirmed' ? '❌' : '⚠️');
                        const verdictLabel = e.verdict === 'confirmed' ? 'Confirmed' : (e.verdict === 'not_confirmed' ? 'Not Confirmed' : 'Inconclusive');
                        summaryText += `• ${e.name} — ${verdictIcon} ${verdictLabel} (${e.primaryMetric.result})\n`;
                    });
                    summaryText += `\n`;
                }
                summaryText += `----------------------------------------\n\n`;
            });
            
            navigator.clipboard.writeText(summaryText.trim()).then(() => {
                alert('Slack summary copied to clipboard!');
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        }

        function downloadJSON() {
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const dateStr = new Date().toISOString().split('T')[0];
            const filename = `monthly-releases-${dateStr}.json`;
            
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('releases-sidebar-collapsed', sidebar.classList.contains('collapsed'));
        }
        
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        (function() {
            if (localStorage.getItem('releases-sidebar-collapsed') === 'true') {
                const sidebar = document.getElementById('sidebar');
                if (sidebar) sidebar.classList.add('collapsed');
            }
        })();

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
