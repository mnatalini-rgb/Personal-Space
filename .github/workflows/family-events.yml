name: Family Events Aggregator

on:
  schedule:
    - cron: '0 7 * * 5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r family-events/requirements.txt
      - name: Run aggregator
        run: python family-events/main.py
      - name: Commit and push report
        run: |
          git config user.name "Family Events Bot"
          git config user.email "bot@github.com"
          git add family-events/data/state.json family-events-report.html
          git diff --staged --quiet || git commit -m "🎪 Weekly family events update"
          git push
